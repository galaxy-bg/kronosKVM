version: "3.7"

services:
  api:
    image: kronoskvm-api:${KRONOSKVM_VERSION:-dev}
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: kronoskvm-api
    network_mode: host
    hostname: kronoskvm
    restart: unless-stopped
    read_only: true
    user: "10001:10001"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    group_add:
      - "20"
    device_cgroup_rules:
      - "c 188:* rw"
      - "c 166:* rw"
    tmpfs:
      - /tmp:size=16m,mode=1777
    volumes:
      - /dev:/dev
      - /sys:/sys:ro
      - /sys/firmware/devicetree/base:/run/kronoskvm/device-tree:ro
      - /etc/kronoskvm:/etc/kronoskvm:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  web:
    image: kronoskvm-web:${KRONOSKVM_VERSION:-dev}
    build:
      context: .
      dockerfile: Dockerfile.web
      network: host
    container_name: kronoskvm-web
    network_mode: host
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /var/cache/nginx:size=16m,mode=0755
    depends_on:
      - api
